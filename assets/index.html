<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crud</title>
        <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
        <style>
          body {
            padding: 20px;
            background-color: #EEF0F4;
          }
      label {
        display: inline-block;
        width: auto;
        padding-right: 5px ;
      }
      input,
      select {
        width: auto;
      }
      button {
        width: 90px;
        background-color: #f6a1a1;
        font-size: 15px;
        color: #000;
      }
      .container {
        display: inline-block;
      }
      .box
      {
        margin-top: 5px;
        border: 2px solid maroon;
        padding-right: 15px;
        padding-left: 15px;
        border-radius: 5px;
        font-size: 1.5rem;
        background-color: rgb(217, 248, 237);
      }
    </style>
</head>
<body>
    <div class="box">Comments Square</div><br/>

    <label for="">NickName : </label><input id="Namebox" type="text" placeholder="별명"/><br/>
    <label for="">Commenting : </label><input id="Secbox" type="text" placeholder="댓글 입력" /><br/>
    <label for="">ModifySearchNo : </label><input id="Rollbox" type="text" placeholder="Key number to del" /><br/>
    <label for="">Gender : </label>
     <select name="" id="Genbox">
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select> 
        <hr>
    <div class="container">
      <button id="Insbtn">INSERT</button>
      <button id="Selbtn">SELECT</button>
      <button id="Updbtn">UPDATE</button>
      <button id="Delbtn">DELETE</button>
    </div>
     <!-- view list -->
    <hr style="height: 3px; background: #000" />
    <h4 class="">The Comment List</h4>
    <div class="container mt-3">
      <table class="table table-striped">
        <thead>
          <th>Sno</th>
          <th>NickName</th>
          <th>Comment</th>
          <th>MNo</th>
          <th>Gender</th>
        </thead>
        <tbody id="tbody1"></tbody>
      </table>
    </div>

  <!--  -------- IMPORT + CONFIGURATION --------  -->

    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAflAzOGpImU8j0h0dtkPjumbnVLKR-WIs",
    authDomain: "fire9db-16489.firebaseapp.com",
    projectId: "fire9db-16489",
    storageBucket: "fire9db-16489.appspot.com",
    messagingSenderId: "178694833077",
    appId: "1:178694833077:web:1d87d464889e2a7c7d0ffc"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);

  import {getDatabase, ref, get, set, child, update, remove}
  from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

  const db = getDatabase(app);

  // -----Reference ---- //

      var namebox = document.getElementById("Namebox");
      var rollbox = document.getElementById("Rollbox");
      var secbox = document.getElementById("Secbox");
      var genbox = document.getElementById("Genbox");

      var insBtn = document.getElementById("Insbtn");
      var selBtn = document.getElementById("Selbtn");
      var updBtn = document.getElementById("Updbtn");
      var delBtn = document.getElementById("Delbtn");

        //-----------INSERT DATA FUNCTION ------------------------//

      function InsertData() {
        set(ref(db, "Comment/" + rollbox.value), {
          NameOfStd: namebox.value,
          Section: secbox.value,
          RollNo: rollbox.value,
          Gender: genbox.value,
        })
          .then(() => {
            alert("data stored successfully");
          })
          .catch((error) => {
            alert("unsuccessful, error" + error);
          });
      }

       //-----------SELECT DATA FUNCTION ------------------//

      function SelectData() {
        const dbref = ref(db);

        get(child(dbref, "Comment/" + rollbox.value))
          .then((snapshot) => {
            if (snapshot.exists()) {
              namebox.value = snapshot.val().NameOfStd;
              secbox.value = snapshot.val().Section;
              genbox.value = snapshot.val().Gender;
            } else {
              alert("No data found");
            }
          })
          .catch((error) => {
            alert("unsuccessful, error" + error);
          });
      }

      //-----------UPDATE DATA FUNCTION ------------------------//

      function UpdateData() {
        update(ref(db, "Comment/" + rollbox.value), {
          NameOfStd: namebox.value,
          Section: secbox.value,
          Gender: genbox.value,
        })
          .then(() => {
            alert("data updated successfully");
          })
          .catch((error) => {
            alert("unsuccessful, error" + error);
          });
      }

      //-----------DELETE DATA FUNCTION ------------------------//

      function DeleteData() {
        remove(ref(db, "Comment/" + rollbox.value))
          .then(() => {
            alert("data removed successfully");
          })
          .catch((error) => {
            alert("unsuccessful, error" + error);
          });
      }


      // ----events to btn ---
      insBtn.addEventListener('click', InsertData);
      selBtn.addEventListener("click", SelectData);
      updBtn.addEventListener("click", UpdateData);
      delBtn.addEventListener("click", DeleteData);

      //-------FILLING THE TABLE ----------//

      var stdNo = 0;
      var tbody = document.getElementById("tbody1");

      function AddItemToTable(name, sec, roll, gen) {
        let trow = document.createElement("tr");
        let td1 = document.createElement("td");
        let td2 = document.createElement("td");
        let td3 = document.createElement("td");
        let td4 = document.createElement("td");
        let td5 = document.createElement("td");

        td1.innerHTML = ++stdNo;
        td2.innerHTML = name;
        td3.innerHTML = sec;
        td4.innerHTML = roll;
        td5.innerHTML = gen;

        trow.appendChild(td1);
        trow.appendChild(td2);
        trow.appendChild(td3);
        trow.appendChild(td4);
        trow.appendChild(td5);

        tbody.appendChild(trow);
      }

      function AddAllItemsToTable(Comment) {
        stdNo = 0;
        tbody.innerHTML = "";
        Comment.forEach((element) => {
          AddItemToTable(
            element.NameOfStd,
            element.Section,
            element.RollNo,
            element.Gender
          );
        });
      }

            //----------GETTING ALL DATA --------------//

      function GetAllDataOnce() {
        const dbRef = ref(db);

        get(child(dbRef, "Comment")).then((snapshot) => {
          var students = [];

          snapshot.forEach((childSnapshot) => {
            students.push(childSnapshot.val());
          });

          AddAllItemsToTable(students);
        });
      }
            window.onload = GetAllDataOnce;

</script>


</body>
</html>
